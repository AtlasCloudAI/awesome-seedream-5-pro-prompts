name: 🎬 Submit a Prompt
description: Contribute a Seedance 2 video prompt to the collection
title: "[Prompt] <short title>"
labels: ["prompt-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Approved prompts are added to the README and you're credited in the acknowledgements.
        Bonus: attach a **real preview video generated via [Atlas Cloud](https://www.atlascloud.ai/console/api-keys?utm_source=github&utm_campaign=awesome-seedance-2-prompt)**.
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: e.g. "Slow push-in on a rainy street"
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt
      description: The full prompt text (include camera, subject, motion).
      render: text
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options: [Camera language, Subject, Motion, Style, UGC, Ads, Meme, Other]
    validations:
      required: true
  - type: input
    id: preview
    attributes:
      label: Preview video URL (optional)
      description: An MP4/GIF preview generated via Atlas Cloud (Seedance 2 / Kling 3 / Veo 3.1…).
  - type: input
    id: author
    attributes:
      label: Your handle (for credit)
      placeholder: "@yourname"
